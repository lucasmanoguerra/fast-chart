# SDD Configuration — fast-chart
# Hybrid persistence mode: openspec files + Engram memory
# Auto-generated by sdd-init

project:
  name: fast-chart
  description: Native desktop trading chart application (GPU-accelerated, hexagonal architecture)
  language: Rust
  stack:
    windowing: winit
    rendering: wgpu
    text_rendering: glyphon
  architecture: hexagonal (ports-and-adapters)

persistence:
  mode: hybrid
  openspec_path: openspec/
  engram_enabled: true

testing:
  framework: null
  runner: cargo test
  strict_tdd: false
  note: No test framework configured yet. Project is pre-initialization. Strict TDD unavailable until a test infrastructure is set up.

git:
  initialized: true
  default_branch: master

toolchain:
  rustc: 1.96.1 (2026-06-26)
  cargo: 1.96.1
  target: x86_64-unknown-linux-gnu

artifact_store:
  modes:
    - openspec
    - engram
  openspec_dirs:
    - design/
    - spec/
    - tasks/
    - decisions/
    - config/
  atl_registry: .atl/skill-registry.md
